<!doctype html>
<html lang="es">
  <head>
    <!-- ============== METADATOS ESENCIALES ============== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portafolio Profesional de Luca Bazzani - Software Developer. Especialista en arquitecturas robustas y experiencias digitales inmersivas."
    />
    <meta name="author" content="Luca Bazzani" />

    <!-- ============== TÍTULO ============== -->
    <title>Luca Bazzani // Software Developer</title>

    <!-- ============== FUENTES (Tipografía optimizada para lectura técnica) ============== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&family=Stack+Sans+Notch:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- ============== LIBRERÍAS CSS EXTERNAS ============== -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <!-- ============== HOJAS DE ESTILO PROPIAS ============== -->
    <!-- animations.css se carga antes para asegurar que las clases estén listas al renderizar -->
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="matrix-theme">
    <main>
      <!-- ============== SECTION: HERO (TERMINAL DE COMANDOS) ============== -->
      <section id="hero" class="full-screen-center">
        <div
          class="terminal-frame glass-effect"
          data-aos="zoom-out"
          data-aos-duration="1200"
        >
          <!-- Canvas para lluvia Matrix optimizada -->
          <canvas id="matrix-canvas"></canvas>

          <header class="terminal-header">
            <div class="terminal-controls">
              <span class="dot red"></span>
              <span class="dot yellow"></span>
              <span class="dot green"></span>
            </div>
            <div class="terminal-utility">
              <button
                id="rabbit-btn"
                class="icon-btn"
                title="Follow the white rabbit..."
              >
                <i class="fa-solid fa-terminal"></i>
              </button>
            </div>
          </header>

          <article class="hero__content">
            <div class="console-output">
              <h1 class="hero__title">
                <span id="typed-text"></span>
              </h1>
              <p class="hero__subtitle">
                Ingeniería de software con enfoque en escalabilidad e interfaces
                disruptivas.
              </p>
            </div>
            <!-- Zona de mensajes de sistema (Easter Eggs) -->
            <div class="easter-egg-message" id="easter-egg-container"></div>
          </article>
        </div>
      </section>

      <!-- ============== SECTION: ARSENAL (TECH STACK) ============== -->
      <section id="tech-stack" class="section-padding" data-aos="fade-up">
        <div class="container">
          <h2 class="section-title text-center">
            <span class="accent">// STACK</span>
          </h2>
          <!-- Contenedor optimizado para un layout grid más senior que el actual -->
          <div class="tech-stack__grid-v2">
            <!-- Los items se mantienen igual estructuralmente para respetar tus JS assets, 
               pero se estilizarán diferente en el CSS -->
            <div class="tech-item" data-tech="Java">
              <img
                src="https://img.shields.io/badge/Java-ED8B00?style=for-the-badge&logo=openjdk&logoColor=white"
                alt="Java"
              />
            </div>
            <div class="tech-item" data-tech="TypeScript">
              <img
                src="https://img.shields.io/badge/TypeScript-F7DF1E?style=for-the-badge&logo=typescript&logoColor=black"
                alt="JS"
              />
            </div>
            <div class="tech-item" data-tech="React">
              <img
                src="https://img.shields.io/badge/React-61DAFB?style=for-the-badge&logo=react&logoColor=black"
                alt="React"
              />
            </div>
            <div class="tech-item" data-tech="Docker">
              <img
                src="https://img.shields.io/badge/Docker-2496ED?style=for-the-badge&logo=docker&logoColor=white"
                alt="Docker"
              />
            </div>
          </div>
        </div>
      </section>

      <!-- ============== SECTION: CONTACTO ============== -->
      <section id="contacto" class="section-padding">
        <div class="container text-center">
          <h2 class="section-title" data-aos="fade-up">NOS HABLEMOS</h2>
          <p class="contacto__subtitle" data-aos="fade-up">
            Disponible para nuevos desafíos.
          </p>

          <nav class="contacto__social" data-aos="fade-up">
            <a
              href="https://www.linkedin.com/in/bazzaniluca"
              target="_blank"
              class="social-link"
              >LINKEDIN</a
            >
            <a
              href="https://github.com/lucabazzani"
              target="_blank"
              class="social-link"
              >GITHUB</a
            >
          </nav>
        </div>
      </section>
    </main>

    <footer class="terminal-footer">
      <p>2026 | LUCABAZZADEV</p>
    </footer>

    <!-- SCRIPTS -->
    <script
      src="https://kit.fontawesome.com/d36a77a071.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>

    <script src="js/matrix-rain.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
